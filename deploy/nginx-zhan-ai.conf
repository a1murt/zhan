upstream zhan_frontend {
    server 127.0.0.1:3060;
}
upstream zhan_api {
    server 127.0.0.1:8050;
}

# HTTPS — zhan-ai.kz (frontend + API under /api/)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zhan-ai.kz www.zhan-ai.kz;

    ssl_certificate /etc/letsencrypt/live/zhan-ai.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhan-ai.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://zhan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://zhan_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name zhan-ai.kz www.zhan-ai.kz;
    return 301 https://$host$request_uri;
}
