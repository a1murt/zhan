name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  check-backend:
    name: Check Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "from src.api.mock_api import app; print('mock_api OK')"
      - name: Check model imports
        run: python -c "from src.models.multimodal import MultimodalMyopiaClassifier; print('model OK')"
      - name: Check dataset imports
        run: python -c "from src.data.odir_dataset import OdirDataset; print('dataset OK')"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [build-frontend, check-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t zhan-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t zhan-frontend:test ./frontend
      - name: Smoke test backend
        run: |
          docker run -d --name backend-test -p 8050:8050 zhan-backend:test \
            uvicorn src.api.mock_api:app --host 0.0.0.0 --port 8050
          sleep 3
          curl -sf http://localhost:8050/health | grep -q '"status":"ok"'
          docker stop backend-test
