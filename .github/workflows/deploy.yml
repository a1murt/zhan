name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -e

            # Clone or pull
            if [ ! -d /opt/zhan ]; then
              sudo git clone https://github.com/${{ github.repository }}.git /opt/zhan
            fi
            cd /opt/zhan
            sudo git fetch origin main
            sudo git reset --hard origin/main

            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # Install docker compose plugin if missing
            if ! docker compose version &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker-compose-plugin
            fi

            # Stop any existing zhan containers
            sudo docker compose down --remove-orphans || true

            # Kill ALL Docker containers using our ports (from previous deploys)
            sudo docker ps -q --filter "publish=8050" | xargs -r sudo docker stop || true
            sudo docker ps -q --filter "publish=3000" | xargs -r sudo docker stop || true

            # Kill non-Docker processes on our ports
            for port in 8050 3000; do
              pid=$(sudo ss -tlnp "sport = :$port" | grep -oP 'pid=\K\d+' | head -1)
              [ -n "$pid" ] && sudo kill -9 "$pid" 2>/dev/null || true
            done
            sleep 2

            # Build and deploy
            sudo docker compose build --no-cache
            sudo docker compose up -d

            # Health check
            echo "Waiting for services..."
            sleep 10
            curl -sf http://localhost:8050/health && echo " Backend OK"
            curl -sf http://localhost:3000 > /dev/null && echo " Frontend OK"
            echo "Deployment complete!"
